"""
Provides base, head, and patch coverage numbers for a file's line coverage.
This type exists for compatibility with clients that query lineCoverage.
"""
type LineCoverage {
  baseNumber: Float
  headNumber: Float
  headCoverage: Float
}

type ImpactedFile {
  fileName: String
  baseName: String
  headName: String
  isNewFile: Boolean!
  isRenamedFile: Boolean!
  isDeletedFile: Boolean!
  baseCoverage: CoverageTotals
  headCoverage: CoverageTotals
  patchCoverage: CoverageTotals
  changeCoverage: Float
  missesCount: Int!
  hashedPath: String!
  lineCoverage: LineCoverage
  segments(filters: SegmentsFilters): SegmentsResult!
}

type ImpactedFiles {
  results: [ImpactedFile]
}

union ImpactedFilesResult =
    ImpactedFiles
  | UnknownFlags
