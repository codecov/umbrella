scalar DateTime

type Query {
  me: Me
  owner(username: String!): Owner
  config: Config!
  myOrganizations(
    filters: OrganizationSetFilters
    first: Int
    after: String
    last: Int
    before: String
  ): MyOrganizationConnection! @cost(complexity: 15, multipliers: ["first", "last"])
}

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}
